<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Butterfly Classifier</title>

    <!-- Bootstrap 5 -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <style>

        *{
            font-family:'Poppins',sans-serif;
        }

        body{

            min-height:100vh;

            background:
            linear-gradient(
                135deg,
                #0f172a,
                #111827,
                #1e293b
            );

            overflow-x:hidden;

            position:relative;
        }

        body::before{

            content:"";

            position:absolute;

            width:500px;
            height:500px;

            background:#7c3aed;

            border-radius:50%;

            top:-200px;
            left:-150px;

            filter:blur(140px);

            opacity:0.4;
        }

        body::after{

            content:"";

            position:absolute;

            width:450px;
            height:450px;

            background:#06b6d4;

            border-radius:50%;

            bottom:-180px;
            right:-150px;

            filter:blur(140px);

            opacity:0.4;
        }

        .main-container{

            position:relative;

            z-index:2;

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            padding:30px;
        }

        .glass-card{

            width:100%;
            max-width:900px;

            background:rgba(255,255,255,0.07);

            backdrop-filter:blur(20px);

            border:1px solid rgba(255,255,255,0.1);

            border-radius:30px;

            padding:50px;

            box-shadow:
            0 8px 32px rgba(0,0,0,0.4);
        }

        .title{

            font-size:52px;

            font-weight:700;

            color:white;
        }

        .subtitle{

            color:#94a3b8;

            margin-top:10px;
        }

        .upload-box{

            margin-top:40px;

            border:2px dashed rgba(255,255,255,0.2);

            border-radius:25px;

            padding:50px;

            text-align:center;

            transition:0.4s;

            background:rgba(255,255,255,0.03);
        }

        .upload-box:hover{

            transform:translateY(-5px);

            border-color:#38bdf8;

            background:rgba(255,255,255,0.05);
        }

        .upload-icon{

            font-size:70px;

            color:#38bdf8;
        }

        .upload-title{

            color:white;

            font-size:24px;

            font-weight:600;

            margin-top:20px;
        }

        .upload-subtitle{

            color:#94a3b8;

            margin-top:10px;
        }

        input[type="file"]{
            display:none;
        }

        .custom-btn{

            margin-top:30px;

            padding:14px 40px;

            border:none;

            border-radius:15px;

            background:
            linear-gradient(
                135deg,
                #7c3aed,
                #06b6d4
            );

            color:white;

            font-weight:600;

            font-size:17px;

            transition:0.4s;

            box-shadow:
            0 10px 25px rgba(124,58,237,0.4);
        }

        .custom-btn:hover{

            transform:translateY(-3px);

            box-shadow:
            0 15px 35px rgba(124,58,237,0.7);
        }

        .preview-image{

            width:100%;

            max-width:320px;

            border-radius:25px;

            margin-top:35px;

            box-shadow:
            0 10px 30px rgba(0,0,0,0.5);
        }

        .result-card{

            margin-top:40px;

            background:rgba(255,255,255,0.05);

            border-radius:25px;

            padding:30px;

            border:1px solid rgba(255,255,255,0.08);

            animation:fadeIn 0.7s ease;
        }

        .result-label{

            color:#94a3b8;

            font-size:15px;
        }

        .prediction{

            color:#38bdf8;

            font-size:38px;

            font-weight:700;

            margin-top:10px;
        }

        .confidence{

            display:inline-block;

            margin-top:15px;

            background:
            linear-gradient(
                135deg,
                #10b981,
                #06b6d4
            );

            color:white;

            padding:10px 20px;

            border-radius:30px;

            font-weight:600;
        }

        .footer-text{

            margin-top:35px;

            color:#64748b;

            font-size:14px;

            a {
                text-decoration: none;
                color:#64748b;
                font-size: 15px;
                }
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(20px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @media(max-width:768px){

            .glass-card{
                padding:30px;
            }

            .title{
                font-size:36px;
            }

            .upload-title{
                font-size:20px;
            }
        }

    </style>

</head>

<body>

    <div class="main-container">

        <div class="glass-card text-center">

            <h1 class="title">
                🦋 Butterfly Classifier 🦋
            </h1>

            <p class="subtitle">
                Deep Learning Powered Butterfly Classification System
            </p>

            <form
                method="POST"
                enctype="multipart/form-data"
            >

                <label class="upload-box w-100">

                    <i class="bi bi-cloud-arrow-up-fill upload-icon"></i>

                    <div class="upload-title">
                        Upload Butterfly Image
                    </div>

                    <div class="upload-subtitle">
                        Drag & Drop or Click to Upload
                    </div>

                    <input
                        type="file"
                        name="image"
                        accept="image/*"
                        onchange="previewImage(event)"
                        required
                    >

                </label>

                <img
                    id="preview"
                    class="preview-image"
                    style="display:none;"
                >

                <br>

                <button
                    type="submit"
                    class="custom-btn"
                >
                    <i class="bi bi-stars"></i>
                    Predict Butterfly
                </button>

            </form>

            {% if prediction %}

            <div class="result-card">

                <div class="result-label">
                    AI Prediction Result
                </div>

                <div class="prediction">
                    {{ prediction }}
                </div>

                <div class="confidence">
                    High Confidence Prediction
                </div>

                <img
                    src="{{ image_path }}"
                    class="preview-image"
                >

            </div>

            {% endif %}

            <div class="footer-text">
                Model Build by <a href="https://www.linkedin.com/in/md-eahea-mozumder/">Eahea Mozumder</a>
            </div>

        </div>

    </div>

    <script>

        function previewImage(event){

            const preview =
            document.getElementById('preview');

            preview.src =
            URL.createObjectURL(
                event.target.files[0]
            );

            preview.style.display = "block";
        }

    </script>

</body>

</html>
